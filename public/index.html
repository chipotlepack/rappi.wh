        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        .leaflet-popup-content,
        .leaflet-popup-content * {
            user-select: text !important;
            -webkit-user-select: text !important;
            cursor: text;
        }
        .leaflet-popup-content-wrapper {
            pointer-events: auto;
        }
        .leaflet-popup-content table {
            border-collapse: collapse;
            width: 100%;
        }
        .leaflet-popup-content th,
        .leaflet-popup-content td {
            padding: 4px 6px;
            vertical-align: top;
            text-align: left;
        }
        .cluster-progress {
            background: transparent !important;
            border: none !important;
        }
        .cluster-progress div {
            width: 38px;
            height: 38px;
            margin-left: 0 !important;
            margin-top: 0 !important;
            border-radius: 50%;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 0 0 1px rgba(0,0,0,0.18);
        }
        .cluster-red div { background: rgba(220, 53, 69, 0.92) !important; }
        .cluster-orange div { background: rgba(255, 127, 0, 0.92) !important; }
        .cluster-yellow div { background: rgba(241, 196, 15, 0.92) !important; color: #222; }
        .cluster-green div { background: rgba(40, 167, 69, 0.92) !important; }
        .popup-thumb {
            max-width: 220px;
            border-radius: 8px;
            display: block;
        }
        .popup-link {
            display: inline-block;
            margin-top: 4px;
            padding: 4px 14px;
            background: #EE6123;
            color: #fff !important;
            border-radius: 5px;
            font-weight: 600;
            font-size: 12px;
            text-decoration: none !important;
            word-break: break-word;
            cursor: pointer;
        }
        .popup-link:hover {
            background: #c94e0e;
            color: #fff !important;
        }
        
        .wh-panel {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 1000;
            width: 220px;
            max-height: calc(100vh - 24px);
            overflow-y: auto;
            background: rgba(255,255,255,0.96);
            border: 1px solid rgba(0,0,0,0.10);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            font-family: Arial, sans-serif;
            pointer-events: auto;
        }
        .wh-panel-logo {
            padding: 10px 12px 6px 12px;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            background: rgba(255,255,255,0.98);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .wh-panel-logo img {
            width: 130px;
            height: auto;
            display: block;
        }
        .wh-city {
            border-top: 1px solid rgba(0,0,0,0.06);
        }
        .wh-city-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            background: rgba(248,248,248,0.98);
        }
        .wh-city-toggle {
            border: 0;
            background: transparent;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            color: #444;
            padding: 0;
            width: 20px;
            text-align: center;
        }
        .wh-city-body {
            padding: 8px 10px 10px 10px;
            font-size: 11px;
        }
        .wh-city.minimized .wh-city-body {
            display: none;
        }
        .wh-stat-top {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 6px;
        }
        .wh-big-number {
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
        }
        .wh-sub {
            font-size: 11px;
            color: #666;
        }
        .wh-progress {
            height: 7px;
            width: 100%;
            background: rgba(0,0,0,0.08);
            border-radius: 999px;
            overflow: hidden;
            margin: 6px 0 8px 0;
        }
        .wh-progress > div {
            height: 100%;
            background: #32a852;
            border-radius: 999px;
        }
        .wh-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 3px 0;
        }
        .wh-label {
            color: #555;
        }
        @media (max-width: 900px) {
            .wh-panel {
                top: auto;
                bottom: 54px;
                right: 10px;
                width: 190px;
                max-height: 55vh;
            }
            .wh-panel-logo img {
                width: 110px;
            }
            .wh-big-number {
                font-size: 18px;
            }
        }

        /* ── Barra de avance total México ── */
        .wh-bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1100;
            background: rgba(255,255,255,0.97);
            color: #333;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-family: 'Segoe UI', Arial, sans-serif;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.12);
            border-top: 3px solid #EE6123;
            min-height: 46px;
        }
        .wh-bottom-bar .wh-bar-flag {
            font-size: 20px;
            flex-shrink: 0;
        }
        .wh-bottom-bar .wh-bar-title {
            font-weight: 700;
            font-size: 13px;
            white-space: nowrap;
            flex-shrink: 0;
            color: #EE6123;
        }
        .wh-bottom-bar .wh-bar-track {
            flex: 1;
            height: 14px;
            background: rgba(0,0,0,0.06);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            min-width: 120px;
        }
        .wh-bottom-bar .wh-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #EE6123, #55d90f);
            transition: width 0.8s ease;
            position: relative;
        }
        .wh-bottom-bar .wh-bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
            animation: wh-shimmer 2.5s infinite;
        }
        @keyframes wh-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .wh-bottom-bar .wh-bar-pct {
            font-size: 18px;
            font-weight: 800;
            color: #EE6123;
            flex-shrink: 0;
            min-width: 56px;
            text-align: right;
        }
        .wh-bottom-bar .wh-bar-stats {
            display: flex;
            gap: 14px;
            font-size: 11px;
            flex-shrink: 0;
        }
        .wh-bottom-bar .wh-bar-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
        }
        .wh-bottom-bar .wh-bar-stat-num {
            font-weight: 700;
            font-size: 14px;
        }
        .wh-bottom-bar .wh-bar-stat-lbl {
            opacity: 0.55;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #555;
        }
        .wh-bar-stat-num.green { color: #28a745; }
        .wh-bar-stat-num.orange { color: #EE6123; }
        .wh-bar-stat-num.red { color: #dc3545; }
        .wh-bar-stat-num.white { color: #333; }
        @media (max-width: 700px) {
            .wh-bottom-bar {
                padding: 6px 10px;
                gap: 8px;
                flex-wrap: wrap;
            }
            .wh-bottom-bar .wh-bar-stats {
                display: none;
            }
            .wh-bottom-bar .wh-bar-title {
                font-size: 11px;
            }
            .wh-bottom-bar .wh-bar-pct {
                font-size: 15px;
            }
        }

        </style>

		document.addEventListener("DOMContentLoaded", function() {
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });       

        function whStatusKey(v) {
            return String(v || '').trim().toUpperCase();
        }
        function whSummarize(fc) {
            var features = (fc && fc.features) ? fc.features : [];
            var total = features.length;
            var installed = 0;
            var counts = {
                'INSTALADA': 0,
                'EN PROCESO': 0,
                'REQUIERE CONTACTO': 0,
                'VISITADA': 0,
                'NO ACEPTO': 0,
                'YA NO EXISTE': 0,
                'PENDIENTE': 0
            };
            features.forEach(function(f) {
                var s = whStatusKey(f.properties ? f.properties['ESTATUS FINAL'] : '');
                if (counts.hasOwnProperty(s)) counts[s] += 1;
                if (s === 'INSTALADA') installed += 1;
            });
            return {
                total: total,
                installed: installed,
                pct: total ? ((installed / total) * 100) : 0,
                counts: counts
            };
        }
        function whRender(cardId, summary) {

                '<div class="wh-stat-top"><div class="wh-big-number">' + summary.total + '</div><div class="wh-sub">' + summary.pct.toFixed(1) + '% instalada</div></div>' +

                '<div class="wh-row"><span class="wh-label">Instalada</span><strong>' + summary.counts['INSTALADA'] + '</strong><span class="wh-label">En proceso</span><strong>' + summary.counts['EN PROCESO'] + '</strong></div>' +
                '<div class="wh-row"><span class="wh-label">Req. contacto</span><strong>' + summary.counts['REQUIERE CONTACTO'] + '</strong><span class="wh-label">Visitada</span><strong>' + summary.counts['VISITADA'] + '</strong></div>' +
                '<div class="wh-row"><span class="wh-label">Rechazada</span><strong>' + summary.counts['NO ACEPTO'] + '</strong><span class="wh-label">No existe</span><strong>' + summary.counts['YA NO EXISTE'] + '</strong></div>' +
                '<div class="wh-row"><span class="wh-label">Pendiente</span><strong>' + summary.counts['PENDIENTE'] + '</strong></div>';
        }
